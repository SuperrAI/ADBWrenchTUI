name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: adbwrenchtui

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            label: macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            label: macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            label: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release assets (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          raw="${BIN_NAME}-${{ matrix.label }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "${raw}"
          chmod +x "${raw}"

          archive="${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.label }}.tar.gz"
          tmp_dir="$(mktemp -d)"
          cp "${raw}" "${tmp_dir}/${BIN_NAME}"
          tar -czf "${archive}" -C "${tmp_dir}" "${BIN_NAME}"
          rm -rf "${tmp_dir}"

          sha256sum "${archive}" > "${archive}.sha256"

      - name: Prepare release assets (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $raw = "$env:BIN_NAME-${{ matrix.label }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" $raw

          $archive = "$env:BIN_NAME-$env:GITHUB_REF_NAME-${{ matrix.label }}.zip"
          Compress-Archive -Path $raw -DestinationPath $archive

          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -FilePath "$archive.sha256" -Encoding ascii

      - name: Upload release artifacts (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            adbwrenchtui-${{ github.ref_name }}-${{ matrix.label }}.tar.gz
            adbwrenchtui-${{ github.ref_name }}-${{ matrix.label }}.tar.gz.sha256

      - name: Upload release artifacts (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            adbwrenchtui-${{ github.ref_name }}-${{ matrix.label }}.zip
            adbwrenchtui-${{ github.ref_name }}-${{ matrix.label }}.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Generate checksums bundle
        shell: bash
        run: |
          set -euo pipefail
          cat artifacts/*.sha256 | sort > checksums-sha256.txt
          cp checksums-sha256.txt artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
            artifacts/checksums-sha256.txt
